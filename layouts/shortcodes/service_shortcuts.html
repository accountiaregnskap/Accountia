<section class="svc-shortcuts">
  <div class="svc-shortcuts-head">
    <h2>{{ .Get "title" }}</h2>
    <p>{{ .Get "lead" }}</p>
  </div>

  <div class="svc-shortcuts-grid">
    {{ range $n := (slice 1 2 3 4) }}
      {{ $title := printf "c%dt" $n }}
      {{ $desc := printf "c%dd" $n }}
      {{ $url := printf "c%du" $n }}
      {{ $icon := printf "c%di" $n }}
      <a class="svc-shortcut-card" href="{{ $.Get $url }}">
        {{ with ($.Get $icon) }}<img class="svc-shortcut-icon" src="/images/icons/{{ . }}.svg" alt="" aria-hidden="true">{{ end }}
        <h3>{{ $.Get $title }}</h3>
        <p>{{ $.Get $desc }}</p>
      </a>
    {{ end }}
  </div>
</section>
