<div class="ac-slider" data-autoplay="true" data-interval="3000" aria-label="Accountia gallery">
  <div class="ac-slider-track">
    <figure class="ac-slide is-active">
      <img src="/images/slider/accountia-slide-1.png" alt="Accountia Regnskap for bedrifter i hele Norge" loading="eager" />
    </figure>
    <figure class="ac-slide">
      <img src="/images/slider/accountia-slide-2.png" alt="La oss hjelpe bedriften din å vokse" loading="lazy" />
    </figure>
    <figure class="ac-slide">
      <img src="/images/slider/accountia-slide-3.png" alt="Bygg trygghet med Accountia" loading="lazy" />
    </figure>
    <figure class="ac-slide">
      <img src="/images/slider/accountia-slide-4.png" alt="Bruker du for mye tid på regnskap" loading="lazy" />
    </figure>
    <figure class="ac-slide">
      <img src="/images/slider/accountia-slide-5.png" alt="Ta kontakt i dag" loading="lazy" />
    </figure>
  </div>

  <button class="ac-slider-nav ac-slider-prev" type="button" aria-label="Previous slide">
    <span aria-hidden="true">&#10094;</span>
  </button>
  <button class="ac-slider-nav ac-slider-next" type="button" aria-label="Next slide">
    <span aria-hidden="true">&#10095;</span>
  </button>
</div>

<style>
  .ac-slider {
    position: relative;
    width: min(100vw - 32px, 1240px);
    margin: 32px auto 40px;
    border-radius: 28px;
    overflow: hidden;
    background: #f5f2ec;
    box-shadow: 0 22px 48px rgba(15, 23, 42, 0.16);
  }

  .ac-slider-track {
    position: relative;
    min-height: 300px;
  }

  .ac-slide {
    display: none;
    margin: 0;
  }

  .ac-slide.is-active {
    display: block;
  }

  .ac-slide img {
    display: block;
    width: 100%;
    height: clamp(320px, 42vw, 540px);
    object-fit: cover;
    object-position: top center;
    background: #f8f8f8;
  }

  .ac-slider-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border: 0;
    border-radius: 999px;
    background: rgba(17, 24, 39, 0.68);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .ac-slider-nav:hover {
    background: rgba(17, 24, 39, 0.86);
  }

  .ac-slider-nav:focus-visible {
    outline: 3px solid rgba(212, 165, 116, 0.45);
    outline-offset: 2px;
  }

  .ac-slider-prev {
    left: 14px;
  }

  .ac-slider-next {
    right: 14px;
  }

  .ac-slider-nav span {
    font-size: 22px;
    line-height: 1;
  }

  @media (max-width: 900px) {
    .ac-slider {
      margin: 20px auto 32px;
      border-radius: 22px;
    }

    .ac-slide img {
      height: clamp(280px, 68vw, 380px);
    }

    .ac-slider-nav {
      width: 42px;
      height: 42px;
    }
  }
</style>

<script>
  (function () {
    const slider = document.querySelector(".ac-slider");
    if (!slider) return;

    const slides = Array.from(slider.querySelectorAll(".ac-slide"));
    const prev = slider.querySelector(".ac-slider-prev");
    const next = slider.querySelector(".ac-slider-next");
    const intervalMs = Number(slider.getAttribute("data-interval")) || 5000;
    let index = 0;
    let timer = null;

    function show(nextIndex) {
      slides[index].classList.remove("is-active");
      index = (nextIndex + slides.length) % slides.length;
      slides[index].classList.add("is-active");
    }

    function start() {
      stop();
      timer = window.setInterval(() => show(index + 1), intervalMs);
    }

    function stop() {
      if (timer) {
        window.clearInterval(timer);
        timer = null;
      }
    }

    prev.addEventListener("click", () => {
      show(index - 1);
      start();
    });

    next.addEventListener("click", () => {
      show(index + 1);
      start();
    });

    slider.addEventListener("focusin", stop);
    slider.addEventListener("focusout", start);

    start();
  })();
</script>
